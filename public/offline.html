<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeTrack — Offline</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      .card { background: #1e293b; border-color: #334155; }
      .btn { background: #3b82f6; }
    }
    .card {
      max-width: 420px;
      margin: 24px;
      padding: 32px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: #64748b; margin: 0 0 20px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
      background: #3B82F6;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      No internet connection detected. TradeTrack keeps working offline for
      sales and inventory you've already loaded — reconnect to sync your
      latest changes.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
